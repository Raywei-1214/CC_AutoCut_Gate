name: Local Upload Agent Desktop

concurrency:
  group: local-upload-agent-desktop-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/local-upload-agent-desktop.yml'
      - 'apps/local-upload-agent/**'
      - 'scripts/local-upload-agent-desktop-*.sh'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check desktop app
        run: bash ./scripts/local-upload-agent-desktop-check.sh

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: local-upload-agent-macos
            artifact_glob: apps/local-upload-agent/src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            artifact_name: local-upload-agent-windows
            artifact_glob: apps/local-upload-agent/src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --dir apps/local-upload-agent exec tauri build

      - name: Collect release files
        if: startsWith(github.ref, 'refs/tags/local-upload-agent-v')
        shell: bash
        run: |
          mkdir -p release-assets
          cp ${{ matrix.artifact_glob }} release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Upload release files
        if: startsWith(github.ref, 'refs/tags/local-upload-agent-v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-release
          path: release-assets/*
          if-no-files-found: error
